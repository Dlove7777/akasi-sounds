name: Release

# Push a tag like v0.1.0 to build installers and attach them to a GitHub Release.
# Builds are UNSIGNED (macOS will show a Gatekeeper warning). To ship signed
# builds, add APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / CSC_LINK secrets and
# electron-builder will pick them up automatically.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build:renderer
      - name: Build installer
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
